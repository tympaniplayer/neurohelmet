name: docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/guide/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Permissions the deploy job needs to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: '0.4.40'
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          url="https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -sSL "$url" | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build
        run: mdbook build docs/guide
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/guide/book

  # Deploy the built book to GitHub Pages.
  #
  # Gated so it does NOT run until Pages is live — otherwise every docs push shows
  # a red X (the deploy 404s when Pages is off, and on a private repo Pages needs a
  # paid plan). The `build` job above still validates the docs on every push.
  #
  # To turn the site on (at public launch): (1) enable Pages with "GitHub Actions"
  # as the source in repo Settings -> Pages, then (2) add a repository variable
  # PAGES_ENABLED = true (Settings -> Secrets and variables -> Actions -> Variables).
  # No workflow edit needed — it starts auto-deploying on push.
  deploy:
    needs: build
    if: vars.PAGES_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
