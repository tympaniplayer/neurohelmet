name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Formatting is tool-owned: fail any push/PR that isn't `cargo fmt`-clean.
  # Run `cargo fmt` locally to fix. Uses default rustfmt settings (edition from Cargo.toml).
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check
